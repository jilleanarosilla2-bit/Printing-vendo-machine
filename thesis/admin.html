    <style>

        /* Essential styles for the Eye Toggle */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-wrapper input {
            width: 100%;

            padding-right: 40px !important; /* Space for the eye icon */
        }
        .eye-toggle {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            padding: 0;
            z-index: 10;
        }
        .eye-toggle svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->

    <script>
        // Global function to toggle password visibility
        function toggleField(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('svg');

            if (input.type === 'password') {
                input.type = 'text';

                // Change to Open Eye Icon
                icon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            } else {
                input.type = 'password';
                // Change back to Eye with Slash (image_d828c2.png)
                icon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.06"></path>
                    <path d="M22.9 12.2a15.42 15.42 0 0 1-5.13 5.12"></path>
                    <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"></path>
                    <path d="M1 1l22 22"></path>
            `;
            }
        }
    </script>
